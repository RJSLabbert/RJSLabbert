<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="60%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#1e1a16"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b87333"/>
      <stop offset="50%" stop-color="#c9a24d"/>
      <stop offset="100%" stop-color="#b87333"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b87333" stop-opacity="0"/>
      <stop offset="30%" stop-color="#b87333" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#c9a24d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a24d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bgGrad)" rx="8"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#b87333" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#b87333" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#b87333" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="160" stroke="#b87333" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="160" stroke="#b87333" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="700" y1="0" x2="700" y2="160" stroke="#b87333" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Floating code particles -->
  <text x="30" y="35" font-family="monospace" font-size="10" fill="#b87333" fill-opacity="0.12">const faith = true;</text>
  <text x="680" y="28" font-family="monospace" font-size="9" fill="#c9a24d" fill-opacity="0.1">// Built on the Rock</text>
  <text x="750" y="140" font-family="monospace" font-size="9" fill="#b87333" fill-opacity="0.1">return purpose;</text>
  <text x="20" y="148" font-family="monospace" font-size="9" fill="#c9a24d" fill-opacity="0.1">while(alive) { grow(); }</text>
  <text x="580" y="155" font-family="monospace" font-size="9" fill="#b87333" fill-opacity="0.08">git commit -m "trust"</text>

  <!-- Left copper accent bar -->
  <rect x="48" y="40" width="3" height="80" fill="url(#copperGrad)" rx="2"/>

  <!-- Eyebrow -->
  <text x="68" y="62" font-family="'Courier New', monospace" font-size="11" fill="#b87333" letter-spacing="2">// RJSLabbert</text>

  <!-- Main name -->
  <text x="65" y="100" font-family="Georgia, serif" font-size="34" font-weight="700" fill="url(#copperGrad)" letter-spacing="1">Riaan Slabbert</text>

  <!-- Tagline -->
  <text x="68" y="124" font-family="'Courier New', monospace" font-size="12" fill="#888" letter-spacing="1">IT Technician · Android Dev · Python · Building local AI</text>

  <!-- Bottom accent line -->
  <rect x="48" y="140" width="500" height="1" fill="url(#lineGrad)"/>

  <!-- Right side RSC tag -->
  <text x="820" y="88" font-family="'Courier New', monospace" font-size="10" fill="#b87333" fill-opacity="0.5" text-anchor="middle">RSC</text>
  <text x="820" y="102" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">rocksolidcode</text>
  <text x="820" y="114" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle">.co.za</text>
  <circle cx="820" cy="72" r="18" fill="none" stroke="#b87333" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 6"/>
</svg>
